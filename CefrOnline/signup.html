<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEFR Mock Taker | Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="signup">
  <div class="page">
    <div id="site-header"></div>
    <section class="hero">
      <h1>Create your account</h1>
      <p>Sign up to start practicing CEFR mock tests and track your progress.</p>
    </section>
    <form class="form" id="signup-form">
      <div>
        <label for="name">Full name</label>
        <input id="name" type="text" placeholder="Your name" required />
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="********" required />
      </div>
      <button class="btn btn-primary" type="submit">Create account</button>
      <p class="notice" id="signup-msg" style="display:none"></p>
      <p>Already have an account? <a href="login">Login</a></p>
    </form>
  </div>
  <script type="module" src="assets/js/app-api.js"></script>
</body>
</html>
